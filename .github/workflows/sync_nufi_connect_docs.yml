name: Sync docs with gitbook

on:
  push:
    branches: ['github-actions-readme']
    paths: ['docs/sso/**']

jobs:
  copy_nufi_connect_docs:
    name: Copy Cardano NuFi Connect Docs
    uses: ./.github/workflows/copy_to_gitbook_repo.yml
    with:
      source_file: 'docs/sso'
      rename: 'nuficonnect-single-sign-on-sdk-for-cardano-dapps-closed-beta'
    secrets:
      access_token: ${{ secrets.API_TOKEN_GITHUB }}
