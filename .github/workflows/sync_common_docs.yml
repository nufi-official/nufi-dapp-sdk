name: Sync docs with gitbook

on:
  push:
    branches: ['github-actions-readme']
    paths: ['docs/snap/**', 'docs/sso/**', 'docs/common/**']

jobs:
  copy_cardano_snap_docs:
    name: Copy Common Docs
    uses: ./.github/workflows/copy_to_gitbook_repo.yml
    with:
      source_file: 'docs/common/'
      destination_folder: 'common'
    secrets:
      access_token: ${{ secrets.API_TOKEN_GITHUB }}
